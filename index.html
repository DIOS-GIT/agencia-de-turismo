<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agencia de Turismo | Cargando...</title>
    
    <link rel="stylesheet" href="css/styles.css" id="theme-stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <h2 id="agency-logo">Cargando...</h2>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#destinos">Destinos</a></li>
                <li><a href="#nosotros">Nosotros</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <section id="inicio" class="hero" id="hero-bg">
        <div class="hero-content">
            <h1 id="hero-title">...</h1>
            <p id="hero-subtitle">...</p>
            <a href="#destinos" class="btn-primary">Ver Planes</a>
        </div>
    </section>

    <section id="destinos" class="destinations-section">
        <h2 class="section-title">Nuestros Planes Destacados</h2>
        <div class="destinations-grid" id="planes-container">
            <p style="text-align: center; grid-column: 1/-1;">Buscando las mejores experiencias...</p>
        </div>
    </section>

    <section id="nosotros" class="about-section">
        <div class="about-container">
            <h2>¿Por qué elegirnos?</h2>
            <div id="about-text-content">...</div>
        </div>
    </section>

    <footer id="contacto">
        <div class="footer-content">
            <p>&copy; 2026 <span id="footer-agency-name">Agencia</span>. Todos los derechos reservados.</p>
            <div class="socials" id="socials-container">
                </div>
        </div>
    </footer>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Tu configuración (Copiada de Firebase)
    const firebaseConfig = {
        apiKey: "AIzaSyDH2k5DRWDwq0J2h64wEtFhDQzMqUZlCTo",
        authDomain: "agencia-turismo-b10cb.firebaseapp.com",
        databaseURL: "https://agencia-turismo-b10cb-default-rtdb.firebaseio.com",
        projectId: "agencia-turismo-b10cb",
        storageBucket: "agencia-turismo-b10cb.appspot.com",
        messagingSenderId: "646452586253",
        appId: "1:646452586253:web:95b958505625c7c25b7244"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const configRef = ref(db, 'configuracion'); // 'configuracion' es la ruta donde guardamos datos en el admin

    onValue(configRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            // Actualizar elementos de la web
            document.title = `${data.agency_name} | Agencia de Turismo`;
            document.getElementById('agency-logo').innerText = data.agency_name;
            document.getElementById('footer-agency-name').innerText = data.agency_name;
            document.getElementById('hero-title').innerText = data.hero_title;
            
            console.log("Datos recibidos de Firebase:", data);
        }
    });
</script>
    </body>
</html>
